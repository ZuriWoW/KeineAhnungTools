:root {
    /* Standardwerte, falls JS noch nicht geladen hat */
    --primary: #38bdf8;
    --bg-glow: rgba(56, 189, 248, 0.15); 
}

body { 
    background-color: #050505; 
    color: #f1f5f9; 
    font-family: 'Roboto', sans-serif;
    margin: 0;
    min-height: 100vh;
    position: relative;
    overflow-x: hidden;
}


body::before {
    content: "";
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle at top, var(--bg-glow) 0%, transparent 80%);
    pointer-events: none;
    z-index: -1;
    transition: all 0.8s ease-in-out;
}

        .gradient-title {
            background: linear-gradient(90deg, var(--primary) 0%, #FFFFFF 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

.boss-card { 
            background-color: #0f172a; 
            border: 1px solid #1e293b; 
            transition: all 0.3s ease;
            border-radius: 12px; /* Runde Kanten */
            overflow: hidden;    /* Wichtig: Bild wird an den Kanten mit gerundet */
            position: relative;
            top: 0;
        }
        
        .boss-card:hover { 
            border-color: var(--primary); 
            transform: translateY(-1px); /* Die Karte hebt sich beim Mouseover */
            box-shadow: 0 10px 20px rgba(0,0,0,0.4); /* Leichter Schatten für Tiefe */
        }

        .boss-image { 
            height: 90px; 
            width: 100%; 
            object-fit: cover; 
            opacity: 0.6;
            filter: brightness(0.7) contrast(1.2);
            display: block;
        }

        .text-accent { color: var(--primary); }
        .bg-accent { background-color: var(--primary); }
        .border-accent { border-color: var(--primary); }

        /* Scrollbar Styling */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0a0a0a; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--primary); }

        select option {
            background-color: #0f172a;
            color: white;
        }

.status-dot {

.dot-ok { background: #22c55e; box-shadow: 0 0 8px #22c55e; }
.dot-missing { background: #ef4444; opacity: 0.3; }
.setup-stats-grid {

    align-items: center;
}

async function addEntry() {
    const name = document.getElementById('playerName').value;
    const pInfo = gildenSpieler.find(p => p.name === name);
    const boss = document.getElementById('bossSelect').value;
    const status = document.getElementById('statusSelect').value;
    const note = document.getElementById('playerNote').value;

    if (!pInfo) { alert("Bitte Spieler wählen!"); return; }

    const btn = document.getElementById('saveBtn');
    btn.disabled = true; 
    btn.innerText = "...";


    const { data: existingEntries, error: checkError } = await _supabase
        .from('loot_entries')
        .select('id')
        .eq('name', pInfo.name)
        .eq('boss', boss);

    if (checkError) {
        console.error("Fehler beim Check:", checkError);
    } else if (existingEntries && existingEntries.length > 0) {
        const entryId = existingEntries[0].id;
        await _supabase
            .from('loot_entries')
            .update({ 
                status: status, 
                note: note,
                created_at: new Date().toISOString() 
            })
            .eq('id', entryId);
    } else {
	
        await _supabase
            .from('loot_entries')
            .insert([{ 
                name: pInfo.name, 
                charClass: pInfo.class, 
                role: pInfo.role, 
                boss, 
                status, 
                note 
            }]);
    }

    document.getElementById('playerNote').value = "";
    btn.disabled = false; 
    btn.innerText = "Speichern";
    fetchData();
}

function setTheme(color) {

    document.documentElement.style.setProperty('--primary', color);
    

    const r = parseInt(color.slice(1, 3), 16);
    const g = parseInt(color.slice(3, 5), 16);
    const b = parseInt(color.slice(5, 7), 16);
    
    const rgbaGlow = `rgba(${r}, ${g}, ${b}, 0.15)`;
    document.documentElement.style.setProperty('--bg-glow', rgbaGlow);

    localStorage.setItem('wowReclearTheme', color);
    render();
}

        { label: "5% Intellect", cls: ["Mage"] },
        { label: "5% Attack Power", cls: ["Warrior"] },
        { label: "5% Stamina", cls: ["Priest"] },
        { label: "5% Phys. Damage", cls: ["Demon Hunter"] },
        { label: "3% Magic Damage", cls: ["Monk"] },
        { label: "3% Versatility", cls: ["Paladin", "Druid"] },
		{ label: "Devotion Aura", cls: ["Paladin"] },
        { label: "Damage Reduction", cls: ["Paladin", "Evoker"] },
        { label: "Hunter's Mark", cls: ["Hunter"] },
        { label: "Skyfury", cls: ["Shaman"] }
    ];

    const buffHtml = raidBuffs.map(b => {
        const ok = check(b.cls);
        return `
            <div class="buff-item">
                <span class="${ok ? 'text-white' : 'text-slate-600'}">${b.label}</span>
                <div class="status-dot ${ok ? 'dot-ok' : 'dot-missing'}"></div>
            </div>`;
    }).join('');

    const totalBossesCount = Object.keys(bossConfig).length;
    const participationStats = gildenSpieler.map(p => {
        let count = 0;
        // Wir prüfen alle Bosse im activeSetups Objekt
        Object.keys(activeSetups).forEach(bName => {
            const playerIdsInSetup = activeSetups[bName];
            // Wir suchen den Eintrag dieses Spielers für diesen spezifischen Boss
            const entry = data.find(d => d.name === p.name && d.boss === bName);
            if (entry && playerIdsInSetup.includes(entry.id)) {
                count++;
            }
        });
        return { name: p.name, count: count, charClass: p.class };
    }).filter(s => s.count > 0) // Nur Spieler anzeigen, die mindestens 1 Boss haben
      .sort((a, b) => b.count - a.count); // Höchste Beteiligung zuerst

const statsHtml = participationStats.map(s => {
    let vaultText = "";
    let vaultColor = "text-slate-600"; // Standardfarbe (keine Vault)

    if (s.count >= 6) {
        vaultText = "3x Vault";
        vaultColor = "text-green-400";
    } else if (s.count >= 4) {
        vaultText = "2x Vault";
        vaultColor = "text-yellow-400";
    } else if (s.count >= 2) {
        vaultText = "1x Vault";
        vaultColor = "text-red-500";
    }

    return `
        <div class="bg-black/20 border border-white/5 p-2 rounded flex flex-col gap-1">
            <div class="flex justify-between items-center">
                <span style="color:${classColors[s.charClass]}" class="text-[11px] font-bold uppercase">${s.name}</span>
                <span class="text-[12px] font-mono font-bold text-white">
                    ${s.count}/${totalBossesCount}
                </span>
            </div>
            ${vaultText ? `
                <div class="flex justify-end">
                    <span class="text-[10px] font-black uppercase tracking-tighter ${vaultColor}">
                        ${vaultText}
                    </span>
                </div>` : ''}
        </div>
    `;
}).join('');

const renderPoolBtn = (p) => `
    <button onclick="toggleSetup('${boss}', ${p.id})" 
        style="border-color:${activeSetups[boss]?.includes(p.id) ? 'var(--primary)' : '#1e293b'}; background:${activeSetups[boss]?.includes(p.id) ? 'var(--primary-glow)' : 'transparent'}"

        <div class="grid grid-cols-1 xl:grid-cols-4 gap-6">
            <div class="xl:col-span-3">
                <div class="flex justify-between items-center mb-6 border-b border-white/10 pb-4">
                    <h2 class="text-xl font-black uppercase italic">${boss}</h2>
                    <div class="text-accent font-bold text-xl">${setupPlayers.length} / 20</div>
                </div>

                <div class="grid md:grid-cols-2 gap-8">
                    <div class="space-y-6">
                        <div><h3 class="text-[11px] text-sky-400 font-black uppercase mb-3 tracking-widest">Brauchen Loot</h3><div class="flex flex-wrap gap-2">${needs.map(renderPoolBtn).join('')}</div></div>
                        <div><h3 class="text-[11px] text-slate-500 font-black uppercase mb-3 tracking-widest">Pass / Kein Loot</h3><div class="flex flex-wrap gap-2">${passes.map(renderPoolBtn).join('')}</div></div>
                    </div>
                    <div class="bg-black/40 p-4 rounded-xl border border-white/5">
                        <h3 class="text-[14px] text-slate-500 uppercase font-bold mb-4">Aktives Setup</h3>
                        <div class="space-y-4">
                            <div><div class="flex justify-between border-b border-blue-900/30 mb-2 text-[12px] text-blue-400 font-bold uppercase"><span>Tanks</span><span>${tanks.length}</span></div>${tanks.map(renderRow).join('')}</div>
                            <div><div class="flex justify-between border-b border-green-900/30 mb-2 text-[12px] text-green-400 font-bold uppercase"><span>Heiler</span><span>${heals.length}</span></div>${heals.map(renderRow).join('')}</div>
                            <div><div class="flex justify-between border-b border-red-900/30 mb-2 text-[12px] text-red-400 font-bold uppercase"><span>DPS</span><span>${dps.length}</span></div>${dps.map(renderRow).join('')}</div>
                        </div>
                    </div>
                </div>
            </div>

<div class="xl:col-span-1">
                <div class="buff-sidebar bg-[#0f172a]/60 border border-white/5 p-4 rounded-xl sticky top-4">
                    <h3 class="text-[13px] text-accent font-black uppercase mb-4 tracking-[0.2em] text-center border-b border-accent/20 pb-2">Raid Buffs/Debuffs</h3>
                    ${buffHtml}
                    
                    <div class="mt-6 pt-4 border-t border-white/10 space-y-3">
                        <div class="flex justify-between items-center text-[12px] uppercase font-bold text-slate-500">
                            <span>Lust/Hero</span>
                            <div class="status-dot ${check(['Shaman', 'Mage', 'Hunter', 'Evoker']) ? 'dot-ok' : 'dot-missing'}"></div>
                        </div>
                        
                        <div class="flex justify-between items-center text-[12px] uppercase font-bold text-slate-500">
                            <span>Battle-Rez</span>
                            <div class="status-dot ${check(['Druid', 'Death Knight', 'Warlock', 'Paladin']) ? 'dot-ok' : 'dot-missing'}"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="mt-12 pt-8 border-t border-white/10">
            <div class="flex items-center justify-between mb-6">
                <h3 class="text-[12px] text-slate-500 font-black uppercase tracking-[0.3em]">Geplante Boss-Beteiligung (Gesamt)</h3>
                <span class="text-[12px] text-slate-600 italic">Basierend auf allen Setups</span>
            </div>
            <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-3">
                ${statsHtml || '<div class="col-span-full text-center text-slate-600 text-xs uppercase py-4">Noch keine Einteilungen vorgenommen</div>'}
            </div>
        </div>
    `;
}

function toggleSetup(boss, id) { 
    if(!isAdmin) return; 

    if (!activeSetups[boss]) {
        activeSetups[boss] = [];
    }

    const idx = activeSetups[boss].indexOf(id); 
    
    if(idx > -1) {
        activeSetups[boss].splice(idx, 1); 
    } else {
        activeSetups[boss].push(id); 
    }

    localStorage.setItem('wowSetups_v1', JSON.stringify(activeSetups)); 
    selectSetupBoss(boss); 
}

        function setTheme(color) { 
            document.documentElement.style.setProperty('--primary', color); 
            document.documentElement.style.setProperty('--primary-glow', color + '33'); 
            localStorage.setItem('wowReclearTheme', color); 
            render(); 
        }

function checkLogin() {
    const input = document.getElementById('adminPassword').value;
    if (btoa(input) === _0x4a21) { 
        isAdmin = true;
        localStorage.setItem('adminLoggedIn', 'true');
        
        document.getElementById('loginSection').classList.add('hidden');
        document.getElementById('logoutSection').classList.remove('hidden');
        render();
    } else {
        alert("Falsches Passwort!");
    }
    document.getElementById('adminPassword').value = '';
}

function logout() {
    isAdmin = false;
    localStorage.removeItem('adminLoggedIn');
    
    document.getElementById('loginSection').classList.remove('hidden');
    document.getElementById('logoutSection').classList.add('hidden');
    render();
}
        
        function updateSelectColor() { 
            const playerSelect = document.getElementById('playerName');
            const p = gildenSpieler.find(ps => ps.name === playerSelect.value); 
            playerSelect.style.color = p ? classColors[p.class] : "white"; 
        }
		function formatDate(isoString) {
    if(!isoString) return "-";
    const date = new Date(isoString);
    return date.toLocaleDateString('de-DE', { 
        day: '2-digit', 
        month: '2-digit', 
        hour: '2-digit', 
        minute: '2-digit' 
    }) + " Uhr";
}
        // INIT
        const playerSelect = document.getElementById('playerName');
        playerSelect.innerHTML = '<option value="" style="color: white;">Spieler wählen...</option>';
        gildenSpieler.sort((a,b) => a.name.localeCompare(b.name)).forEach(p => {

const savedTheme = localStorage.getItem('wowReclearTheme') || '#38bdf8';
setTheme(savedTheme);
if (isAdmin) {
    document.getElementById('loginSection').classList.add('hidden');
    document.getElementById('logoutSection').classList.remove('hidden');
