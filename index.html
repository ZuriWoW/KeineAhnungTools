<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keine Ahnung Reclear Checker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;600;800&display=swap');
        
:root {
    /* Standardwerte, falls JS noch nicht geladen hat */
    --primary: #38bdf8;
    --bg-glow: rgba(56, 189, 248, 0.15); 
}

body { 
    background-color: #050505; 
    color: #f1f5f9; 
    font-family: 'Roboto', sans-serif;
    margin: 0;
    min-height: 100vh;
    position: relative;
    overflow-x: hidden;
}


body::before {
    content: "";
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle at top, var(--bg-glow) 0%, transparent 80%);
    pointer-events: none;
    z-index: -1;
    transition: all 0.8s ease-in-out;
}

        .gradient-title {
            background: linear-gradient(90deg, var(--primary) 0%, #FFFFFF 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
.boss-card.is-open {
    border-color: var(--primary) !important;
    box-shadow: 0 0 15px rgba(var(--primary-rgb), 0.2);
}

/* Optional: Ein pulsierender Glow-Effekt für den Rand wenn offen */
.boss-card.is-open::after {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: 12px;
    box-shadow: inset 0 0 10px var(--primary);
    opacity: 0.3;
    pointer-events: none;
}
.boss-card { 
            background-color: #0f172a; 
            border: 1px solid #1e293b; 
            transition: all 0.3s ease;
            border-radius: 12px; /* Runde Kanten */
            overflow: hidden;    /* Wichtig: Bild wird an den Kanten mit gerundet */
            position: relative;
            top: 0;
        }
        
        .boss-card:hover { 
            border-color: var(--primary); 
            transform: translateY(-1px); /* Die Karte hebt sich beim Mouseover */
            box-shadow: 0 10px 20px rgba(0,0,0,0.4); /* Leichter Schatten für Tiefe */
        }

        .boss-image { 
            height: 90px; 
            width: 100%; 
            object-fit: cover; 
            opacity: 0.6;
            filter: brightness(0.7) contrast(1.2);
            display: block;
        }

        .text-accent { color: var(--primary); }
        .bg-accent { background-color: var(--primary); }
        .border-accent { border-color: var(--primary); }

        /* Scrollbar Styling */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0a0a0a; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--primary); }

        select option {
            background-color: #0f172a;
            color: white;
        }
.buff-sidebar {
    background: rgba(15, 23, 42, 0.6);
    border-left: 1px solid rgba(56, 189, 248, 0.1);
    padding: 15px;
    height: fit-content;
    position: sticky;
    top: 20px;
    border-radius: 12px;
}

.buff-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 6px 0;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    font-size: 12px;
}

.buff-item:last-child { border: none; }

.status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
}
.dot-ok { background: #22c55e; box-shadow: 0 0 8px #22c55e; }
.dot-missing { background: #ef4444; opacity: 0.3; }
.setup-stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 8px;
    margin-top: 20px;
}
.stat-card {
    background: rgba(255, 255, 255, 0.03);
    border: 1px solid rgba(255, 255, 255, 0.05);
    padding: 8px;
    border-radius: 8px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}
    </style>
</head>
<body class="p-4 md:p-10">
        <header class="text-center mb-8">
            <h1 class="text-5xl font-black uppercase italic gradient-title mb-2">Project Closed</h1>
            <p class="text-[10px] font-bold text-accent tracking-[0.5em] uppercase opacity-70">290426</p>
        </header>
        </div>
</body>
</html>
