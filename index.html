:root {
    /* Standardwerte, falls JS noch nicht geladen hat */
    --primary: #38bdf8;
    --bg-glow: rgba(56, 189, 248, 0.15); 
}

body { 
    background-color: #050505; 
    color: #f1f5f9; 
    font-family: 'Roboto', sans-serif;
    margin: 0;
    min-height: 100vh;
    position: relative;
    overflow-x: hidden;
}


body::before {
    content: "";
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle at top, var(--bg-glow) 0%, transparent 80%);
    pointer-events: none;
    z-index: -1;
    transition: all 0.8s ease-in-out;
}

        .gradient-title {
            background: linear-gradient(90deg, var(--primary) 0%, #FFFFFF 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
.boss-card.is-open {
    border-color: var(--primary) !important;
    box-shadow: 0 0 15px rgba(var(--primary-rgb), 0.2);
}

/* Optional: Ein pulsierender Glow-Effekt für den Rand wenn offen */
.boss-card.is-open::after {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: 12px;
    box-shadow: inset 0 0 10px var(--primary);
    opacity: 0.3;
    pointer-events: none;
}
.boss-card { 
            background-color: #0f172a; 
            border: 1px solid #1e293b; 
            transition: all 0.3s ease;
            border-radius: 12px; /* Runde Kanten */
            overflow: hidden;    /* Wichtig: Bild wird an den Kanten mit gerundet */
            position: relative;
            top: 0;
        }
        
        .boss-card:hover { 
            border-color: var(--primary); 
            transform: translateY(-1px); /* Die Karte hebt sich beim Mouseover */
            box-shadow: 0 10px 20px rgba(0,0,0,0.4); /* Leichter Schatten für Tiefe */
        }

        .boss-image { 
            height: 90px; 
            width: 100%; 
            object-fit: cover; 
            opacity: 0.6;
            filter: brightness(0.7) contrast(1.2);
            display: block;
        }

        .text-accent { color: var(--primary); }
        .bg-accent { background-color: var(--primary); }
        .border-accent { border-color: var(--primary); }

        /* Scrollbar Styling */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0a0a0a; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--primary); }

        select option {
            background-color: #0f172a;
            color: white;
        }
.buff-sidebar {
    background: rgba(15, 23, 42, 0.6);
    border-left: 1px solid rgba(56, 189, 248, 0.1);
    padding: 15px;
    height: fit-content;
    position: sticky;
    top: 20px;
    border-radius: 12px;
}

.buff-item {
    display: flex;

    align-items: center;
    padding: 6px 0;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    font-size: 12px;

.buff-item:last-child { border: none; }

.status-dot {

    height: 8px;

.dot-ok { background: #22c55e; box-shadow: 0 0 8px #22c55e; }
.dot-missing { background: #ef4444; opacity: 0.3; }
.setup-stats-grid {

window.deleteEntry = async function(id) {
    if (!isAdmin) return;

    const { error } = await _supabase
        .from('loot_entries')
        .delete()
        .eq('id', id);

    if (!error) {
        if (typeof data !== 'undefined') {
            data = data.filter(e => e.id != id);
        }
        render();
    } else {
        console.error("Fehler beim Löschen:", error.message);
    }
};
window.clearSetup = async function() {
    if (!isAdmin || !currentSetupBoss) return;
    
    const { error } = await _supabase
        .from('raid_setups')
        .delete()
        .eq('boss', currentSetupBoss);

    if (!error) {
        activeSetups[currentSetupBoss] = [];
        selectSetupBoss(currentSetupBoss);
    } else {
        console.error("Fehler beim Leeren:", error.message);
    }
};
async function fetchData() {
    try {
        const { data: res, error: lootError } = await _supabase
            .from('loot_entries')
            .select('*')
            .order('created_at', { ascending: false });

        if (lootError) {
            console.error("Fehler bei loot_entries:", lootError);
        } else {
            data = res; 
        }

        const { data: sData, error: sError } = await _supabase
            .from('raid_setups')
            .select('*');

        if (sError) {
            console.error("Fehler bei raid_setups:", sError);
        } else {
            const newActiveSetups = {};
            if (sData) {
                sData.forEach(row => {
                    if (!newActiveSetups[row.boss]) {
                        newActiveSetups[row.boss] = [];
                    }
                    const pId = row.player_id || row.id;
                    newActiveSetups[row.boss].push(parseInt(pId));
                });
            }
            activeSetups = newActiveSetups;
        }


        render(); 
        
        if (currentSetupBoss) {
            selectSetupBoss(currentSetupBoss); 
        }

    } catch (err) {
        console.error("Fehler in fetchData:", err);
    }
}

async function addEntry() {
    const name = document.getElementById('playerName').value;
    const pInfo = gildenSpieler.find(p => p.name === name);
    const boss = document.getElementById('bossSelect').value;
    const status = document.getElementById('statusSelect').value;
    const note = document.getElementById('playerNote').value;

    if (!pInfo) { alert("Bitte Spieler wählen!"); return; }

    const btn = document.getElementById('saveBtn');
    btn.disabled = true; 
    btn.innerText = "...";


    const { data: existingEntries, error: checkError } = await _supabase
        .from('loot_entries')
        .select('id')
        .eq('name', pInfo.name)
        .eq('boss', boss);

    if (checkError) {
        console.error("Fehler beim Check:", checkError);
    } else if (existingEntries && existingEntries.length > 0) {
        const entryId = existingEntries[0].id;
        await _supabase
            .from('loot_entries')
            .update({ 
                status: status, 
                note: note,
                created_at: new Date().toISOString() 
            })
            .eq('id', entryId);
    } else {
	
        await _supabase
            .from('loot_entries')
            .insert([{ 
                name: pInfo.name, 
                charClass: pInfo.class, 
                role: pInfo.role, 
                boss, 
                status, 
                note 
            }]);
    }

    document.getElementById('playerNote').value = "";
    btn.disabled = false; 
    btn.innerText = "Speichern";
    fetchData();
}

async function saveSetup() {
    // 1. Grund-Checks
    if (!isAdmin) {
        alert("Nur Admins können speichern!");
        return;
    }
    if (!currentSetupBoss) {
        alert("Bitte wähle zuerst einen Boss aus!");
        return;
    }

    const boss = currentSetupBoss;
    // Wir holen die IDs und stellen sicher, dass es nur reine Nummern sind
    const playerIds = (activeSetups[boss] || []).map(id => 
        (typeof id === 'object' && id !== null) ? id.id : parseInt(id)
    );

    // 2. Daten für Supabase aufbereiten
    const insertData = playerIds.map(pId => {
        const player = gildenSpieler.find(g => g.id === pId);
        return {
            boss: boss,
            player_id: pId, // Prüfe, ob die Spalte in Supabase exakt so heißt!
            name: player ? player.name : "Unbekannt"
        };
    });

    // DEBUG: Schau in die Browser-Konsole (F12)
    console.log("Speichervorgang gestartet für:", boss);
    console.log("Datenpaket:", insertData);

    try {
        // SCHRITT A: Erstmal die alten Einträge für diesen Boss löschen
        const { error: delError } = await _supabase
            .from('raid_setups')
            .delete()
            .eq('boss', boss);

        if (delError) {
            console.error("Fehler beim Löschen alter Daten:", delError);
            throw delError;
        }

        // SCHRITT B: Neue Daten einfügen (nur wenn die Liste nicht leer ist)
        if (insertData.length > 0) {
            const { data, error: insError } = await _supabase
                .from('raid_setups')
                .insert(insertData)
                .select(); // Bestätigung von DB anfordern

            if (insError) {
                console.error("Fehler beim Insert:", insError);
                throw insError;
            }
            console.log("Erfolgreich in DB gespeichert:", data);
        } else {
            console.log("Keine Spieler im Setup - Tabelle für diesen Boss jetzt leer.");
        }
        // UI und Daten neu synchronisieren
        await fetchData(); 

    } catch (err) {
        console.error("Kritischer Fehler im saveSetup:", err);
        alert("Fehler beim Speichern! Details in der Konsole (F12).");
    }
}
function toggleSetup(boss, id) { 
    // 1. Sicherheits-Check: Nur Admins dürfen schieben
    if(!isAdmin) return; 

    // 2. Falls für diesen Boss noch gar kein Setup-Objekt existiert, erstelle eines
    if (!activeSetups[boss]) {
        activeSetups[boss] = [];
    }

    // 3. Sicherstellen, dass die ID eine Zahl ist (wichtig für den Vergleich)
    const playerId = parseInt(id);
    
    // 4. Prüfen, ob der Spieler schon im aktiven Setup für diesen Boss ist
    const idx = activeSetups[boss].indexOf(playerId); 
    
    if(idx > -1) {
        // Spieler ist bereits im Setup -> wir entfernen ihn (Ausschalten)
        activeSetups[boss].splice(idx, 1); 
    } else {
        // Spieler ist noch nicht drin -> wir fügen die ID hinzu (Einschalten)
        activeSetups[boss].push(playerId); 
    }

    // 5. Lokal speichern (damit es beim Refresh nicht sofort weg ist)
    localStorage.setItem('wowSetups_v1', JSON.stringify(activeSetups)); 

    // 6. Die Anzeige sofort neu zeichnen, damit man die Änderung sieht
    selectSetupBoss(boss); 
}

function downloadSetupAsImage() {
    if (!currentSetupBoss) return;
    const boss = currentSetupBoss;
    
    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = 600;
    canvas.height = 800;

    // Hintergrund
    ctx.fillStyle = '#0f172a';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Header
    ctx.fillStyle = '#38bdf8';
    ctx.font = 'bold 30px Arial';
    ctx.fillText(boss.toUpperCase(), 40, 60);
    
    ctx.fillStyle = '#ffffff';
    ctx.font = '20px Arial';
    ctx.fillText(`Raid Setup - ${new Date().toLocaleDateString()}`, 40, 90);

    // Spieler zeichnen
    let y = 150;
    const players = (activeSetups[boss] || []).map(entry => {
        const id = typeof entry === 'object' ? entry.id : entry;
        return gildenSpieler.find(g => g.id === id);
    }).filter(Boolean);

    const drawSection = (title, list, color) => {
        ctx.fillStyle = color;
        ctx.font = 'bold 22px Arial';
        ctx.fillText(title, 40, y);
        y += 30;
        ctx.font = '18px Arial';
        ctx.fillStyle = '#cbd5e1';
        list.forEach(p => {
            ctx.fillText(`• ${p.name} (${p.charClass})`, 60, y);
            y += 25;
        });
        y += 20;
    };

    drawSection("SHIELD - TANKS", players.filter(p => p.role === 'Tank'), '#60a5fa');
    drawSection("HEARTS - HEALERS", players.filter(p => p.role === 'Heal'), '#4ade80');
    drawSection("SWORDS - DPS", players.filter(p => p.role === 'DPS'), '#f87171');

    // Download Link
    const link = document.createElement('a');
    link.download = `Setup_${boss}.png`;
    link.href = canvas.toDataURL('image/png');
    link.click();
}
